name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Grant gradlew permissions
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Check signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)

      - name: Restore signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Find unsigned APK
        id: apk
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Align APK
        run: |
          ZIPALIGN="$ANDROID_HOME/build-tools/36.0.0/zipalign"
          "$ZIPALIGN" -f -p 4 "${{ steps.apk.outputs.apk_path }}" app-release-aligned.apk

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          "$APKSIGNER" sign \
            --ks release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out wdtt-panel-release-signed.apk \
            app-release-aligned.apk
          "$APKSIGNER" verify --verbose wdtt-panel-release-signed.apk

      - name: Prepare release APK
        id: release
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          test -n "$VERSION" || (echo "VERSION is empty" && exit 1)
          APK_NAME="wdtt-panel-android-v${VERSION}.apk"
          cp wdtt-panel-release-signed.apk "$APK_NAME"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: wdtt-panel-android-v${{ steps.release.outputs.version }}
          path: ${{ steps.release.outputs.apk_name }}

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: wdtt-panel-release-unsigned
          path: app/build/outputs/apk/release/*.apk

      - name: Create or update version tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.release.outputs.tag }}" "$GITHUB_SHA"
          git push -f origin "${{ steps.release.outputs.tag }}"

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: WDTT Panel Android v${{ steps.release.outputs.version }}
          files: ${{ steps.release.outputs.apk_name }}
          make_latest: true
          generate_release_notes: true
